name: Update package index

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Fetch packages and rebuild BM25 index
        run: python3 tools/fetch-packages.py --output-dir skills/typst/data

      - name: Commit if changed
        run: |
          git diff --exit-code skills/typst/data/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/typst/data/packages.json skills/typst/data/packages-bm25.json
          git commit -m "data: update package index"
          git push
